<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calvdle - Le jeu du haut du crâne</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* --- VARIABLES DE DESIGN & THÈMES --- */
        :root {
            --bg-gradient: radial-gradient(ellipse at 20% 0%, #1a1a2e 0%, #0d0d12 60%);
            --container-bg: rgba(255, 255, 255, 0.04);
            --container-border: rgba(255, 255, 255, 0.09);
            --text-color: #f0f0f5;
            --text-secondary: #7a7a92;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success-color: #10b981;
            --success-bg: rgba(16, 185, 129, 0.12);
            --success-glow: rgba(16, 185, 129, 0.3);
            --error-color: #f43f5e;
            --error-bg: rgba(244, 63, 94, 0.12);
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            --blur: blur(20px);
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        .light-theme {
            --bg-gradient: radial-gradient(ellipse at 20% 0%, #e8e8ff 0%, #f4f4f9 60%);
            --container-bg: rgba(255, 255, 255, 0.75);
            --container-border: rgba(99, 102, 241, 0.12);
            --text-color: #1a1a2e;
            --text-secondary: #6b6b85;
            --accent-color: #4f46e5;
            --accent-hover: #3730a3;
            --accent-glow: rgba(79, 70, 229, 0.2);
            --success-color: #059669;
            --success-bg: rgba(5, 150, 105, 0.1);
            --error-color: #e11d48;
            --error-bg: rgba(225, 29, 72, 0.1);
            --input-bg: rgba(255, 255, 255, 0.8);
            --input-border: rgba(99, 102, 241, 0.2);
            --shadow: 0 25px 50px rgba(79, 70, 229, 0.08);
        }

        /* --- STYLES GÉNÉRAUX --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-body);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 32px 20px 60px;
            transition: background 0.5s ease, color 0.4s ease;
        }

        /* Grain texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .hidden { display: none !important; }

        /* --- HEADER --- */
        header {
            width: 100%;
            max-width: 560px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.2s;
        }
        h1:hover { opacity: 0.8; }
        h1 .logo-icon { color: var(--accent-color); width: 2rem; height: 2rem; flex-shrink: 0; }
        h1 span { color: var(--accent-color); }

        .theme-btn {
            background: var(--container-bg);
            backdrop-filter: var(--blur);
            border: 1px solid var(--container-border);
            color: var(--text-color);
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all 0.3s ease;
        }
        .theme-btn:hover { border-color: var(--accent-color); transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }

        /* --- CONTENEURS --- */
        .container {
            background: var(--container-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--container-border);
            border-radius: 28px;
            padding: 36px;
            width: 100%;
            max-width: 560px;
            text-align: center;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ÉCRAN D'ACCUEIL --- */
        .menu-title {
            font-family: var(--font-display);
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 700;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
        }

        .mode-list { display: flex; flex-direction: column; gap: 12px; }

        .mode-btn {
            background: var(--input-bg);
            border: 1px solid var(--container-border);
            color: var(--text-color);
            padding: 20px 22px;
            border-radius: 18px;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
        }
        .mode-btn i { font-size: 1.7rem; color: var(--accent-color); flex-shrink: 0; transition: transform 0.3s ease; }
        .mode-btn .btn-text { display: flex; flex-direction: column; align-items: flex-start; flex: 1; }
        .mode-btn .btn-text span { font-family: var(--font-body); font-size: 0.82rem; color: var(--text-secondary); font-weight: 400; margin-top: 3px; }
        .mode-btn:hover { border-color: var(--accent-color); background: rgba(99, 102, 241, 0.08); transform: translateY(-3px); box-shadow: 0 12px 30px var(--accent-glow); }
        .mode-btn:hover i { transform: scale(1.15) rotate(6deg); }
        .mode-btn:active { transform: translateY(0); }

        /* --- ZONE DE JEU --- */
        .progress-wrapper { margin-bottom: 22px; }

        .progress-text {
            font-family: var(--font-display);
            font-size: 0.78rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-bar-container { display: flex; gap: 5px; width: 100%; height: 6px; }
        .progress-dot { flex: 1; height: 100%; border-radius: 10px; transition: background-color 0.5s ease, box-shadow 0.5s ease; }
        .progress-dot.empty { background-color: var(--container-border); }
        .progress-dot.correct { background-color: var(--success-color); box-shadow: 0 0 10px var(--success-glow); }
        .progress-dot.wrong { background-color: var(--error-color); }

        /* --- IMAGE --- */
        .image-wrapper {
            width: 100%;
            max-width: 460px;
            height: 460px;
            margin: 0 auto 24px auto;
            border-radius: 18px;
            border: 1px solid var(--container-border);
            overflow: hidden;
            position: relative;
            background-color: #080810;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: scale(0.97);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .image-wrapper.visible { opacity: 1; transform: scale(1); }

        .crop-container { width: 100%; height: 140px; overflow: hidden; position: relative; }
        .crop-container.revealed { height: 460px !important; transition: height 0.7s cubic-bezier(0.16, 1, 0.3, 1); }

        .celebrity-image {
            width: 460px;
            height: 460px;
            max-width: none;
            object-fit: cover;
            object-position: center top;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* --- INPUT --- */
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; position: relative; }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid var(--input-border);
            border-radius: 14px;
            background-color: var(--input-bg);
            color: var(--text-color);
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="text"]::placeholder { color: var(--text-secondary); }
        input[type="text"]:focus { border-color: var(--accent-color); box-shadow: 0 0 0 4px var(--accent-glow); }
        input[type="text"].shake { animation: shake 0.4s ease; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* Autocomplete dropdown */
        .autocomplete-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 60px;
            background: #1c1c28;
            border: 1px solid var(--container-border);
            border-radius: 14px;
            z-index: 100;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            max-height: 220px;
            overflow-y: auto;
        }
        .light-theme .autocomplete-dropdown { background: #ffffff; box-shadow: 0 15px 35px rgba(0,0,0,0.12); }
        .autocomplete-item {
            padding: 12px 18px;
            cursor: pointer;
            text-align: left;
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-color);
            border-bottom: 1px solid var(--container-border);
            transition: background 0.15s ease;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover, .autocomplete-item.active { background: rgba(99, 102, 241, 0.15); color: var(--accent-color); }
        .autocomplete-item mark { background: none; color: var(--accent-color); font-weight: 700; }

        button.submit-btn {
            padding: 15px 22px;
            border: none;
            border-radius: 14px;
            background-color: var(--accent-color);
            color: white;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        button.submit-btn:hover { background-color: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 20px var(--accent-glow); }
        button.submit-btn:active { transform: translateY(0); }
        button.submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; box-shadow: none; }

        /* Message d'erreur vide */
        .empty-hint {
            font-size: 0.82rem;
            color: var(--error-color);
            text-align: left;
            margin-top: -6px;
            margin-bottom: 8px;
            padding-left: 4px;
            font-weight: 500;
            min-height: 18px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .empty-hint.visible { opacity: 1; }

        /* --- RESULT BOX --- */
        .result-box {
            display: none;
            padding: 22px;
            border-radius: 18px;
            margin-top: 18px;
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.92) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .result-box.success {
            display: block;
            background: var(--success-bg);
            border: 1px solid var(--success-color);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.1);
        }
        .result-box.error {
            display: block;
            background: var(--error-bg);
            border: 1px solid var(--error-color);
        }

        .result-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.25rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .result-text {
            font-size: 0.95rem;
            margin-bottom: 4px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .result-profession {
            font-size: 0.78rem;
            font-weight: 700;
            margin-bottom: 18px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            opacity: 0.75;
        }
        .result-box.success .result-profession { color: var(--success-color); }
        .result-box.error   .result-profession { color: var(--error-color); }

        .action-btn {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-family: var(--font-display);
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .action-btn:hover { background-color: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 25px var(--accent-glow); }
        .action-btn:active { transform: translateY(0); }

        /* --- ÉCRAN DE FIN --- */
        #endScreen { max-width: 660px; }

        .score-display {
            font-family: var(--font-display);
            font-size: 2.6rem;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        .score-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-weight: 500;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
            gap: 12px;
            margin-bottom: 28px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
            /* Indication de scroll */
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }
        /* Suppression du masque si pas de scroll */
        .history-grid.no-scroll { mask-image: none; -webkit-mask-image: none; }

        /* Scrollbar stylée */
        .history-grid::-webkit-scrollbar { width: 4px; }
        .history-grid::-webkit-scrollbar-track { background: transparent; }
        .history-grid::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

        .history-item {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            aspect-ratio: 1;
            border: 2px solid transparent;
            transition: transform 0.2s ease;
        }
        .history-item:hover { transform: scale(1.04); }
        .history-item.correct { border-color: var(--success-color); }
        .history-item.wrong { border-color: var(--error-color); }
        .history-item img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
        .history-item .status-icon { position: absolute; top: 6px; right: 6px; font-size: 1.3rem; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; z-index: 2; padding: 2px; }
        .history-item.correct .status-icon { color: var(--success-color); }
        .history-item.wrong .status-icon { color: var(--error-color); }
        .history-item .celeb-name { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: white; font-family: var(--font-body); font-size: 0.72rem; font-weight: 600; padding: 14px 5px 6px; text-align: center; }

        .action-buttons { display: flex; flex-direction: column; gap: 10px; }

        /* Bouton stop infini */
        .stop-btn {
            background: var(--input-bg);
            border: 1px solid var(--container-border);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 200px;
            margin-left: auto;
            margin-right: auto;
        }
        .stop-btn:hover { border-color: var(--error-color); color: var(--error-color); background: var(--error-bg); }

        /* Score live infini */
        .infinite-score-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid var(--accent-color);
            border-radius: 30px;
            padding: 6px 14px;
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 16px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: 20px 14px 40px; }
            .container { padding: 24px 18px; border-radius: 22px; }
            h1 { font-size: 1.6rem; }
            .score-display { font-size: 2rem; }
            .history-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
        }
    </style>
</head>
<body>

    <header>
        <h1 id="logo" onclick="goHome()">
            <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Corps de la tondeuse -->
                <rect x="9" y="3" width="14" height="21" rx="4" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.5"/>
                <!-- Bouton power -->
                <circle cx="16" cy="10" r="2.5" fill="currentColor" opacity="0.45"/>
                <!-- LED indicateur -->
                <circle cx="16" cy="16" r="1.2" fill="currentColor"/>
                <!-- Grille de coupe -->
                <rect x="9" y="20" width="14" height="6" rx="2" fill="currentColor"/>
                <!-- Dents de lame -->
                <line x1="11.5" y1="22" x2="11.5" y2="26" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
                <line x1="13.5" y1="22" x2="13.5" y2="26" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
                <line x1="15.5" y1="22" x2="15.5" y2="26" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
                <line x1="17.5" y1="22" x2="17.5" y2="26" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
                <line x1="19.5" y1="22" x2="19.5" y2="26" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
            </svg>
            Calv<span>dle</span>
        </h1>
        <button class="theme-btn" id="themeToggle"><i class="ph ph-sun" id="themeIcon"></i> <span id="themeText">Mode Clair</span></button>
    </header>

    <!-- ACCUEIL -->
    <div class="container" id="homeScreen">
        <p class="menu-title">Choisissez votre défi</p>
        <div class="mode-list">
            <button class="mode-btn" onclick="launchGame('5')">
                <i class="ph-fill ph-hand-waving"></i>
                <div class="btn-text">Mode 5 Calvs <span>Idéal pour commencer</span></div>
            </button>
            <button class="mode-btn" onclick="launchGame('15')">
                <i class="ph-fill ph-target"></i>
                <div class="btn-text">Mode 15 Calvs <span>Le défi ultime</span></div>
            </button>
            <button class="mode-btn" onclick="launchGame('infinite')">
                <i class="ph-bold ph-infinity"></i>
                <div class="btn-text">Mode Infini <span>Jusqu'à ce que tu craques</span></div>
            </button>
        </div>
    </div>

    <!-- JEU -->
    <div class="container hidden" id="gameScreen">
        <div class="progress-wrapper">
            <div class="progress-text" id="progressText">Calv 1 / 5</div>
            <div class="progress-bar-container" id="progressBar"></div>
            <!-- Badge score pour le mode infini -->
            <div class="infinite-score-badge hidden" id="infiniteBadge">
                <i class="ph-bold ph-trophy"></i> <span id="infiniteScoreVal">0</span> bonne(s) réponse(s)
            </div>
        </div>

        <div class="image-wrapper" id="imageWrapper">
            <div class="crop-container" id="cropContainer">
                <img src="" alt="Sommet du crâne" class="celebrity-image" id="targetImage" referrerpolicy="no-referrer">
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="guessInput" placeholder="Écris ta réponse..." autocomplete="off">
            <button class="submit-btn" id="submitBtn">Deviner</button>
            <!-- Dropdown autocomplete -->
            <div class="autocomplete-dropdown hidden" id="autocompleteDropdown"></div>
        </div>

        <div class="empty-hint" id="emptyHint">Tape un nom avant de deviner !</div>

        <div class="result-box" id="resultBox">
            <div class="result-title" id="resultTitle">Gagné !</div>
            <div class="result-text" id="resultText">-</div>
            <div class="result-profession" id="resultProfession"></div>
            <button class="action-btn" id="nextBtn">Suivant <i class="ph-bold ph-arrow-right"></i></button>
        </div>

        <!-- Bouton arrêt mode infini -->
        <button class="stop-btn hidden" id="stopInfiniteBtn">
            <i class="ph-bold ph-flag-checkered"></i> Terminer la partie
        </button>
    </div>

    <!-- FIN -->
    <div class="container hidden" id="endScreen">
        <h2 class="menu-title">Bilan de la partie</h2>
        <div class="score-display" id="finalScoreDisplay">Score : 0 / 5</div>
        <div class="score-subtitle" id="scoreSubtitle"></div>
        <div class="history-grid" id="historyGrid"></div>
        <div class="action-buttons">
            <button class="action-btn" id="replayBtn"><i class="ph-bold ph-arrow-counter-clockwise"></i> Rejouer</button>
            <button class="mode-btn" id="menuBtn" style="padding: 14px 24px; justify-content: center; font-size: 1rem;">
                <i class="ph-bold ph-house"></i>
                <div class="btn-text">Retour au menu</div>
            </button>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────
        // 1. SONS (sans click)
        // ─────────────────────────────────────────
        const sounds = {

        function goHome() {
            gameScreen.classList.add('hidden');

            closeDropdown();
        }

        function launchGame(mode) {
            currentMode  = mode;
            currentRound = 1;
            roundHistory = [];
            pool         = [...celebrities];
            totalRounds  = mode === '5' ? 5 : mode === '15' ? 15 : 0;

            homeScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');

            // Afficher/masquer les éléments selon le mode
            if (mode === 'infinite') {
                document.getElementById('progressBar').style.display = 'none';
                infiniteBadge.classList.remove('hidden');
                stopBtn.classList.remove('hidden');
                infiniteScore.textContent = '0';
            } else {
                document.getElementById('progressBar').style.display = 'flex';
                infiniteBadge.classList.add('hidden');
                stopBtn.classList.add('hidden');
            }

            buildProgressBar();
            initRound();
        }

        function buildProgressBar() {
            const bar = document.getElementById('progressBar');
            bar.innerHTML = "";
            if (currentMode === 'infinite') return;
            for (let i = 0; i < totalRounds; i++) {
                const dot = document.createElement('div');
                dot.className = "progress-dot empty";
                bar.appendChild(dot);
            }
        }

        function initRound() {
            if (pool.length === 0) pool = [...celebrities];
            const idx = Math.floor(Math.random() * pool.length);
            currentCelebrity = pool[idx];
            pool.splice(idx, 1);

            // Cache le cadre instantanément avant le changement d'image
            imageWrapper.classList.remove('visible');
            cropContainer.classList.remove('revealed');
            cropContainer.style.height = currentCelebrity.cadre || "140px";
            cropContainer.style.transition = "none";

            targetImage.src = currentCelebrity.imageUrl;

            guessInput.value   = "";
            guessInput.disabled = false;
            submitBtn.disabled  = false;
            resultBox.className = "result-box";
            nextBtn.style.display = "block";
            emptyHint.classList.remove('visible');
            closeDropdown();

            // Texte de progression
            if (currentMode === 'infinite') {
                document.getElementById('progressText').innerText = `Mode Infini`;
                const correct = roundHistory.filter(r => r.status === 'correct').length;
                infiniteScore.textContent = correct;
            } else {
                document.getElementById('progressText').innerText = `Calv ${currentRound} / ${totalRounds}`;
            }

            // Apparition fluide
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    imageWrapper.classList.add('visible');
                });
            });
        }

        function checkGuess() {
            if (guessInput.disabled) return;
            closeDropdown();

            const raw = guessInput.value;
            if (raw.trim() === "") {
                // Feedback visuel si vide
                emptyHint.classList.add('visible');
                guessInput.classList.add('shake');
                guessInput.addEventListener('animationend', () => guessInput.classList.remove('shake'), { once: true });
                return;
            }

            emptyHint.classList.remove('visible');
            const playerGuess = normalize(raw);
            const isCorrect   = currentCelebrity._validAnswers.includes(playerGuess);

            guessInput.disabled = true;
            submitBtn.disabled  = true;

            // Révélation de l'image
            cropContainer.style.transition = "";
            cropContainer.classList.add('revealed');

            if (isCorrect) playAudio('success'); else playAudio('error');

            roundHistory.push({ celebrity: currentCelebrity, status: isCorrect ? 'correct' : 'wrong' });

            // Mise à jour barre de progression
            if (currentMode !== 'infinite') {
                const dots = document.getElementById('progressBar').children;
                if (dots[currentRound - 1]) {
                    dots[currentRound - 1].className = `progress-dot ${isCorrect ? 'correct' : 'wrong'}`;
                }
            } else {
                const correct = roundHistory.filter(r => r.status === 'correct').length;
                infiniteScore.textContent = correct;
            }

            // Affichage du résultat avec délai
            setTimeout(() => {
                resultBox.className = "result-box " + (isCorrect ? "success" : "error");
                document.getElementById('resultTitle').innerHTML = isCorrect
                    ? "<i class='ph-fill ph-check-circle'></i> BIEN VU !"
                    : "<i class='ph-fill ph-x-circle'></i> DOMMAGE !";
                document.getElementById('resultText').innerText = isCorrect
                    ? `C'est bien ${currentCelebrity.fullName}.`
                    : `Il s'agissait de : ${currentCelebrity.fullName}.`;
                document.getElementById('resultProfession').innerText = currentCelebrity.profession || "";

                // Fin de partie (modes finis)
                const isLastRound = currentMode !== 'infinite' && currentRound === totalRounds;
                if (isLastRound) {
                    nextBtn.style.display = "none";
                    setTimeout(showEndScreen, 1800);
                }
            }, 450);
        }

        function showEndScreen() {
            playAudio('win');
            gameScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');

            const totalCorrect = roundHistory.filter(r => r.status === 'correct').length;
            const total        = currentMode === 'infinite' ? roundHistory.length : totalRounds;

            finalScore.innerText = `${totalCorrect} / ${total}`;
            document.getElementById('scoreSubtitle').innerText = getScoreComment(totalCorrect, total);

            historyGrid.innerHTML = "";
            roundHistory.forEach(item => {
                const div = document.createElement('div');
                div.className = `history-item ${item.status}`;
                div.innerHTML = `
                    <img src="${item.celebrity.imageUrl}" alt="${item.celebrity.fullName}">
                    <div class="status-icon">
                        ${item.status === 'correct'
                            ? '<i class="ph-fill ph-check-circle"></i>'
                            : '<i class="ph-fill ph-x-circle"></i>'}
                    </div>
                    <div class="celeb-name">${item.celebrity.fullName}</div>
                `;
                historyGrid.appendChild(div);
            });

            // Supprime le masque gradient si pas besoin de scroller
            setTimeout(() => {
                if (historyGrid.scrollHeight <= historyGrid.clientHeight) {
                    historyGrid.classList.add('no-scroll');
                }
            }, 100);
        }

        function getScoreComment(correct, total) {
            const ratio = correct / total;
            if (ratio === 1)      return "Parfait ! Tu connais tous les crânes 🏆";
            if (ratio >= 0.8)     return "Excellent ! Tu es incollable 🔥";
            if (ratio >= 0.6)     return "Pas mal du tout 👍";
            if (ratio >= 0.4)     return "Tu peux faire mieux… 😅";
            if (ratio >= 0.2)     return "Retente ta chance !";
            return "Tu as du boulot 😂";
        }

        // ─────────────────────────────────────────
        // 6. AUTOCOMPLETE
        // ─────────────────────────────────────────
        let activeIndex = -1;

        function buildSuggestions(query) {
            if (!query || query.length < 2) { closeDropdown(); return; }
            const q = normalize(query);
            const matches = [];

            celebrities.forEach(c => {
                if (matches.length >= 6) return;
                const normFull  = normalize(c.fullName);
                const normFirst = normalize(c.firstName);
                const normLast  = normalize(c.lastName);
                // On affiche uniquement si le prénom, nom ou fullName commence par la saisie
                if (normFull.startsWith(q) || normFirst.startsWith(q) || normLast.startsWith(q)) {
                    matches.push(c);
                }
            });

            if (matches.length === 0) { closeDropdown(); return; }

            dropdown.innerHTML = "";
            matches.forEach(c => {
                const item = document.createElement('div');
                item.className = "autocomplete-item";
                // Mise en évidence de la partie tapée dans le fullName affiché
                const display = c.fullName;
                const normDisplay = normalize(display);
                const matchStart = normDisplay.indexOf(q);
                let html;
                if (matchStart !== -1) {
                    html = display.substring(0, matchStart)
                         + `<mark>${display.substring(matchStart, matchStart + query.length)}</mark>`
                         + display.substring(matchStart + query.length);
                } else {
                    html = display;
                }
                item.innerHTML = html;
                item.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    guessInput.value = c.fullName;
                    closeDropdown();
                    checkGuess();
                });
                dropdown.appendChild(item);
            });
            activeIndex = -1;
            dropdown.classList.remove('hidden');
        }

        function closeDropdown() {
            dropdown.classList.add('hidden');
            activeIndex = -1;
        }

        function navigateDropdown(direction) {
            const items = dropdown.querySelectorAll('.autocomplete-item');
            if (!items.length) return;
            items[activeIndex]?.classList.remove('active');
            activeIndex = (activeIndex + direction + items.length) % items.length;
            items[activeIndex].classList.add('active');
            // On récupère le texte pur (sans balises <mark>)
            guessInput.value = items[activeIndex].textContent;
        }

        // ─────────────────────────────────────────
        // 7. ÉCOUTEURS D'ÉVÉNEMENTS
        // ─────────────────────────────────────────
        submitBtn.addEventListener('click', checkGuess);

        nextBtn.addEventListener('click', () => {
            currentRound++;
            initRound();
        });

        stopBtn.addEventListener('click', () => {
            showEndScreen();
        });

        document.getElementById('replayBtn').addEventListener('click', () => {
            launchGame(currentMode);
        });

        document.getElementById('menuBtn').addEventListener('click', goHome);

        guessInput.addEventListener('input', () => {
            emptyHint.classList.remove('visible');
            buildSuggestions(guessInput.value);
        });

        guessInput.addEventListener('keydown', (e) => {
            if (dropdown.classList.contains('hidden') || dropdown.querySelectorAll('.autocomplete-item').length === 0) {
                if (e.key === 'Enter') {
                    if (!submitBtn.disabled) {
                        checkGuess();
                    } else if (resultBox.classList.contains('success') || resultBox.classList.contains('error')) {
                        if (nextBtn.style.display !== "none") nextBtn.click();
                    }
                }
                return;
            }
            if (e.key === 'ArrowDown')  { e.preventDefault(); navigateDropdown(1); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); navigateDropdown(-1); }
            else if (e.key === 'Enter')  { e.preventDefault(); if (activeIndex >= 0) { checkGuess(); } else { closeDropdown(); checkGuess(); } }
            else if (e.key === 'Escape') closeDropdown();
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.input-group')) closeDropdown();
        });

        guessInput.addEventListener('focus', () => {
            if (guessInput.value.length >= 2) buildSuggestions(guessInput.value);
        });

        // Thème
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            document.getElementById('themeText').innerText = isLight ? "Mode Sombre" : "Mode Clair";
            document.getElementById('themeIcon').className = isLight ? "ph ph-moon" : "ph ph-sun";
        });

        // Logo
        document.getElementById('logo').addEventListener('click', goHome);
    </script>
</body>
</html>
